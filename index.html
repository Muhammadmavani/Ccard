<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staferm — Contact Us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4f8 0%, #e8edf5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem 1rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      max-width: 500px;
    }

    .logo-section {
      text-align: center;
    }

    .logo {
      max-width: 120px;
      height: auto;
      margin-bottom: 1.5rem;
    }

    .contact-tile {
      width: 100%;
      max-width: 350px;
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2rem;
      text-align: center;
      box-shadow: 0 4px 32px rgba(13,59,110,0.10), 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .contact-tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(13,59,110,0.15), 0 2px 8px rgba(0,0,0,0.08);
      border-color: #185FA5;
    }

    .contact-tile:active {
      transform: translateY(-2px);
    }

    .contact-tile h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      color: #0D3B6E;
      margin: 0;
      letter-spacing: 0.3px;
    }

    .contact-tile p {
      font-size: 13.5px;
      color: rgba(26, 26, 26, 0.6);
      margin-top: 0.5rem;
      font-weight: 400;
    }

    .icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-section">
      <svg class="logo" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Staferm Logo">
        <!-- Staferm Logo SVG -->
        <text x="10" y="45" font-family="'Cormorant Garamond', serif" font-size="48" font-weight="600" fill="#0D3B6E" letter-spacing="2">STAFERM</text>
      </svg>
    </div>

    <div style="text-align: center; margin-bottom: 1rem;">
      <h1 style="font-size: 24px; color: #0D3B6E; font-family: 'Cormorant Garamond', serif; margin-bottom: 0.5rem;">Contact Us</h1>
      <p style="font-size: 14px; color: rgba(26, 26, 26, 0.6);">Select a team member to view their contact card</p>
    </div>

    <div class="contact-tile" onclick="window.location.href='fatimah.html'">
      <div class="icon">👩‍💼</div>
      <h2>Fatimah Mavani</h2>
      <p>Director of Operations</p>
    </div>

    <div class="contact-tile" onclick="window.location.href='mahmood.html'">
      <div class="icon">👨‍💼</div>
      <h2>Mahmood Rashid</h2>
      <p>President</p>
    </div>
  </div>
</body>
</html>
